<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup Sweep</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0b1c3d, #020917);
  color: white;
}

header {
  background: linear-gradient(90deg, #004aad, #00c6ff);
  padding: 20px;
  text-align: center;
  font-size: 30px;
  font-weight: 600;
}

.container {
  display: flex;
  min-height: calc(100vh - 80px);
}

.sidebar-left {
  width: 20%;
  background: #050f25;
  padding: 20px;
  border-right: 2px solid #1e3a8a;
}

.main {
  width: 80%;
  padding: 25px;
}

h2 {
  color: #00c6ff;
  margin-bottom: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: linear-gradient(160deg, #122c5c, #091835);
  padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
}

.card.leader-card {
  background: linear-gradient(160deg, #2a4a00, #1a3a00);
  border: 2px solid #00ff88;
}

.name {
  font-weight: bold;
  margin-bottom: 8px;
  color: #00c6ff;
}

.team {
  font-size: 13px;
  margin: 5px 0;
  display: flex;
  align-items: center;
}

.flag {
  width: 16px;
  height: 12px;
  margin-right: 6px;
}
</style>
</head>

<body>

<header>🏆 World Cup Sweep 2026</header>

<div class="container">

  <div class="sidebar-left">
    <h2>🏆 Leaderboard</h2>
    <table class="leaderboard-table" id="leaderboard"></table>
  </div>

  <div class="main">
    <h2>Teams</h2>
    <div class="grid" id="teamsGrid"></div>
  </div>

</div>

<script>
const players = [
  "Allison","AP","Bec","Chrissy","Daniel",
  "Jason","Kase","Niall","Reuben","Sarah","Tom","Riley"
];

const teamOwners = {
  "Australia":"Allison","Ivory Coast":"Allison","Norway":"Allison","Switzerland":"Allison",
  "Bosnia":"AP","Uruguay":"AP","USA":"AP","Argentina":"AP",
  "South Korea":"Bec","Curacao":"Bec","Czech Republic":"Bec","Cape Verde":"Bec",
  "Germany":"Chrissy","Saudi Arabia":"Chrissy","South Africa":"Chrissy","Brazil":"Chrissy",
  "France":"Daniel","Austria":"Daniel","Uzbekistan":"Daniel","Belgium":"Daniel",
  "Turkey":"Jason","Paraguay":"Jason","DR Congo":"Jason","Egypt":"Jason",
  "Morocco":"Kase","Colombia":"Kase","New Zealand":"Kase","Japan":"Kase",
  "Netherlands":"Niall","Sweden":"Niall","Ghana":"Niall","Croatia":"Niall",
  "Panama":"Reuben","Spain":"Reuben","Algeria":"Reuben","Iraq":"Reuben",
  "Scotland":"Sarah","Senegal":"Sarah","Tunisia":"Sarah","Ecuador":"Sarah",
  "Iran":"Tom","Jordan":"Tom","Portugal":"Tom","Qatar":"Tom",
  "Mexico":"Riley","Haiti":"Riley","England":"Riley","Canada":"Riley"
};

let leader = "";

function updateLeaderboard(scores) {
  const table = document.getElementById("leaderboard");
  table.innerHTML = "<tr><th>#</th><th>Name</th><th>Pts</th></tr>";

  players.forEach(p => scores[p] ??= 0);
  const sorted = [...players].sort((a,b) => scores[b] - scores[a]);

  sorted.forEach((name,i) => {
    if (i === 0) leader = name;
    table.innerHTML += `<tr><td>${i+1}</td><td>${name}</td><td>${scores[name]}</td></tr>`;
  });
}

function renderTeams() {
  const grid = document.getElementById("teamsGrid");
  grid.innerHTML = "";

  const grouped = {};
  for (let team in teamOwners) {
    grouped[teamOwners[team]] ??= [];
    grouped[teamOwners[team]].push(team);
  }

  for (let person in grouped) {
    const card = document.createElement("div");
    card.className = "card" + (person === leader ? " leader-card" : "");
    card.innerHTML =
      `<div class="name">${person}</div>` +
      grouped[person].map(t => `<div class="team">🏳️ ${t}</div>`).join("");
    grid.appendChild(card);
  }
}

updateLeaderboard({});
renderTeams();
</script>

</body>
</html>

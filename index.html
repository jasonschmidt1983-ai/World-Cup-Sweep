<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup Sweep</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0b1c3d, #020917);
    color: white;
    margin: 0;
}

header {
    background: linear-gradient(90deg, #004aad, #00c6ff);
    padding: 20px;
    text-align: center;
    font-size: 26px;
}

.container {
    display: flex;
}

.left, .right {
    padding: 20px;
}

.left {
    width: 60%;
}

.right {
    width: 40%;
    border-left: 2px solid #1e3a8a;
}

/* cards */
.card {
    background: #122c5c;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 10px;
}

/* match row */
.match {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
}

.team {
    display: flex;
    align-items: center;
}

.flag {
    width: 20px;
    margin-right: 6px;
}

input {
    width: 40px;
    text-align: center;
}

/* leaderboard */
.rank {
    display: flex;
    justify-content: space-between;
}

.gold {
    border: 2px solid gold;
}
</style>
</head>

<body>

<header>🏆 World Cup Sweep 2026</header>

<div class="container">

<!-- LEFT SIDE -->
<div class="left">

<h2>🏅 Leaderboard</h2>
<div id="leaderboard"></div>

</div>

<!-- RIGHT SIDE -->
<div class="right">

<h2>⚽ Enter Results</h2>

<div id="matches"></div>

</div>

</div>

<script>

// FLAG MAP
const flags = {
  "Mexico":"mx","South Africa":"za","South Korea":"kr","Czech Republic":"cz",
  "Turkey":"tr","Paraguay":"py","DR Congo":"cd","Egypt":"eg",
  "Australia":"au","Ivory Coast":"ci","Norway":"no","Switzerland":"ch",
  "Bosnia":"ba","Uruguay":"uy","USA":"us","Argentina":"ar",
  "Curacao":"cw","Cape Verde":"cv",
  "Germany":"de","Saudi Arabia":"sa","Brazil":"br",
  "France":"fr","Austria":"at","Uzbekistan":"uz","Belgium":"be",
  "Morocco":"ma","Colombia":"co","New Zealand":"nz","Japan":"jp",
  "Netherlands":"nl","Sweden":"se","Ghana":"gh","Croatia":"hr",
  "Panama":"pa","Spain":"es","Algeria":"dz","Iraq":"iq",
  "Scotland":"gb-sct","Senegal":"sn","Tunisia":"tn","Ecuador":"ec",
  "Iran":"ir","Jordan":"jo","Portugal":"pt","Qatar":"qa"
};

// PLAYERS
const players = [
  { name: "Jason", teams: ["Turkey","Paraguay","DR Congo","Egypt"] },
  { name: "Allison", teams: ["Australia","Ivory Coast","Norway","Switzerland"] },
  { name: "AP", teams: ["Bosnia","Uruguay","USA","Argentina"] },
  { name: "Bec", teams: ["South Korea","Curacao","Czech Republic","Cape Verde"] },
  { name: "Chrissy", teams: ["Germany","Saudi Arabia","South Africa","Brazil"] },
  { name: "Daniel", teams: ["France","Austria","Uzbekistan","Belgium"] },
  { name: "Kase", teams: ["Morocco","Colombia","New Zealand","Japan"] },
  { name: "Niall", teams: ["Netherlands","Sweden","Ghana","Croatia"] },
  { name: "Reuben", teams: ["Panama","Spain","Algeria","Iraq"] },
  { name: "Sarah", teams: ["Scotland","Senegal","Tunisia","Ecuador"] },
  { name: "Tom", teams: ["Iran","Jordan","Portugal","Qatar"] }
];

// MATCH LIST (you can add more easily)
const matches = [
  { team1:"Mexico", team2:"South Africa" },
  { team1:"South Korea", team2:"Czech Republic" }
];

// CREATE MATCH INPUT UI
const matchContainer = document.getElementById("matches");

matches.forEach((m, index) => {

  const row = document.createElement("div");
  row.className = "card match";

  row.innerHTML = `
    <div class="team">
      <img class="flag" src="https://flagcdn.com/w20/${flags[m.team1]}.png id="s1-${index}" onchange="update()">

    vs

    <input type="number" id="s2-${index}" onchange="update()">

    <div class="team">
      <img class="flag" src="https://flagcdn.com/w20/${flags[m.team2
    </div>
  `;

  matchContainer.appendChild(row);
});

// CALCULATE POINTS
function getPoints(team) {
  let pts = 0;

  matches.forEach((m, i) => {
    const s1 = parseInt(document.getElementById(`s1-${i}`).value) || 0;
    const s2 = parseInt(document.getElementById(`s2-${i}`).value) || 0;

    if (team === m.team1 || team === m.team2) {
      let gf = team === m.team1 ? s1 : s2;
      let ga = team === m.team1 ? s2 : s1;

      if (gf > ga) pts += 3;
      else if (gf === ga && gf !== 0) pts += 1;
    }
  });

  return pts;
}

// UPDATE LEADERBOARD
function update() {

  players.forEach(p => {
    p.total = 0;
    p.teams.forEach(t => p.total += getPoints(t));
  });

  players.sort((a,b) => b.total - a.total);

  const board = document.getElementById("leaderboard");
  board.innerHTML = "";

  players.forEach((p,i) => {

    const div = document.createElement("div");
    div.className = "card rank";

    if(i === 0 && p.total > 0){
      div.classList.add("gold");
    }

    div.innerHTML = `
      <span>${i+1}. ${p.name}</span>
      <span>${p.total} pts</span>
    `;

    board.appendChild(div);
  });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>World Cup Sweep</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: centre;
    background: #f5f5f5;
    padding: 20px;
  }

  h1 {
    margin-bottom: 10px;
  }

  button {
    padding: 10px 15px;
    margin: 10px;
    font-size: 14px;
    cursor: pointer;
  }

  table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 300px;
    background: white;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 8px;
  }

  th {
    background: #0078d4;
    color: white;
  }

  .nav {
    margin-bottom: 20px;
  }

  .nav a {
    display: inline-block;
    padding: 8px 12px;
    background: #0078d4;
    color: white;
    text-decoration: none;
    border-radius: 5px;
  }
</style>
</head>

<body>

<div class="nav">
  /">View NSW Catchment Map</a>
</div>

<h1>🏆 World Cup Sweep</h1>

<button onclick="drawTeams()">Draw Teams</button>
<button onclick="resetTeams()">Reset</button>

<table>
  <thead>
    <tr>
      <th>Player</th>
      <th>Team</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>

// Players (edit these)
const players = [
  "Jason", "Meg", "Andrew", "Tom",
  "Allison", "Rebecca", "Christine", "Niall"
];

// Teams (example World Cup style)
const teams = [
  "Australia", "Brazil", "France", "Germany",
  "Argentina", "England", "Spain", "Portugal"
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function drawTeams() {
  const shuffledTeams = [...teams];
  shuffle(shuffledTeams);

  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  players.forEach((player, index) => {
    const row = `<tr>
      <td>${player}</td>
      <td>${shuffledTeams[index] || "-"}</td>
    </tr>`;
    table.innerHTML += row;
  });
}

function resetTeams() {
  document.getElementById("tableBody").innerHTML = "";
}

</script>

</body>
</html>

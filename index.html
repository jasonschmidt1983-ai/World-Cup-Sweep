<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup Sweep</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0b1c3d, #020917);
    color: white;
    margin: 0;
}

header {
    background: linear-gradient(90deg, #004aad, #00c6ff);
    padding: 20px;
    text-align: center;
    font-size: 30px;
    font-weight: 600;
}

/* LAYOUT */
.container {
    display: flex;
}

.main {
    width: 75%;
    padding: 20px;
}

.spares {
    width: 25%;
    background: #050f25;
    padding: 25px;
    border-left: 2px solid #1e3a8a;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
}

/* CARD */
.card {
    background: linear-gradient(160deg, #122c5c, #091835);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 18px rgba(0,198,255,0.6);
}

.name {
    font-weight: 600;

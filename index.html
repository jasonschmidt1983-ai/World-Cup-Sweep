<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup Sweep</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0b1c3d, #020917);
    color: white;
    margin: 0;
}

header {
    background: linear-gradient(90deg, #004aad, #00c6ff);
    padding: 20px;
    text-align: center;
    font-size: 30px;
    font-weight: 600;
}

.container {
    display: flex;
}

.main {
    width: 75%;
    padding: 20px;
}

.spares {
    width: 25%;
    background: #050f25;
    padding: 25px;
    border-left: 2px solid #1e3a8a;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
}

.card {
    background: linear-gradient(160deg, #122c5c, #091835);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 10px;
}

.name {
    font-weight: 600;
}

.flag {
    width: 20px;
    margin-right: 8px;
}
</style>
</head>

<body>

<header>🏆 World Cup Sweep 2026</header>

<div class="container">

<div class="main">

<h2>Teams</h2>

<div class="card"><b>Jason</b><br>Turkey, Paraguay, DR Congo, Egypt</div>
<div class="card"><b>Allison</b><br>Australia, Ivory Coast, Norway, Switzerland</div>
<div class="card"><b>AP</b><br>Bosnia, Uruguay, USA, Argentina</div>
<div class="card"><b>Bec</b><br>South Korea, Curacao, Czech Republic, Cape Verde</div>
<div class="card"><b>Chrissy</b><br>Germany, Saudi Arabia, South Africa, Brazil</div>
